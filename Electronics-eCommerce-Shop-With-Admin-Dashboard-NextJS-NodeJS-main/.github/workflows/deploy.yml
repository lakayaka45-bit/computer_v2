name: Sync Server Folder to Hugging Face

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Push Server Folder Only to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # Git configuration
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          
          # Clone the Hugging Face space repository into a temporary folder using your real values
          git clone https://lakayaka45-bit:$HF_TOKEN@huggingface.co/spaces/lakayaka45-bit/computer_v2 hf_space
          
          # Clear old files in HF Space except git data
          find hf_space -maxdepth 1 ! -name 'hf_space' ! -name '.git' -exec rm -rf {} +
          
          # Copy everything from local 'server' folder into HF Space folder
          cp -r server/* hf_space/
          
          # Go inside HF folder, commit and push
          cd hf_space
          git add .
          git diff-index --quiet HEAD || git commit -m "Deploy server update from GitHub Actions"
          git push origin main --force